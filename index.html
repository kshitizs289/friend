<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARIA — Teri AI Yaari</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#050508;--surface:#0d0d14;--surface2:#12121c;
    --border:rgba(120,100,255,0.15);--accent:#7c5cfc;
    --accent2:#c084fc;--accent3:#38bdf8;
    --text:#e8e4ff;--muted:#7070a0;
    --user-bubble:linear-gradient(135deg,#7c5cfc,#c084fc);
    --ai-bubble:#13131e;--radius:22px;
    --fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html{font-size:16px;}
  body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;overflow:hidden;cursor:none;}

  #cur{width:12px;height:12px;background:var(--accent);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:screen;transition:width .2s,height .2s,background .2s;}
  #cur-ring{width:36px;height:36px;border:1.5px solid rgba(124,92,252,.5);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .3s,height .3s;}
  .cb #cur{width:20px;height:20px;background:var(--accent2);}
  .cb #cur-ring{width:54px;height:54px;}

  #sf{position:fixed;inset:0;z-index:0;pointer-events:none;}
  .aurora{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
  .aurora::before,.aurora::after{content:'';position:absolute;border-radius:50%;filter:blur(120px);animation:aurF 12s ease-in-out infinite alternate;opacity:.12;}
  .aurora::before{width:700px;height:500px;background:radial-gradient(ellipse,#7c5cfc,transparent);top:-150px;left:-200px;}
  .aurora::after{width:600px;height:400px;background:radial-gradient(ellipse,#38bdf8,transparent);bottom:-100px;right:-100px;animation-delay:-6s;animation-direction:alternate-reverse;}

  @keyframes aurF{0%{transform:translate(0,0) scale(1);}100%{transform:translate(80px,60px) scale(1.15);}}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes sD{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:none}}
  @keyframes sU{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
  @keyframes fIn{from{opacity:0}to{opacity:1}}
  @keyframes mIn{from{opacity:0;transform:translateY(18px) scale(.97)}to{opacity:1;transform:none}}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(56,189,248,.5);}50%{box-shadow:0 0 0 6px rgba(56,189,248,0);}}
  @keyframes tDot{0%,80%,100%{transform:scale(1);opacity:.5;}40%{transform:scale(1.3);opacity:1;background:var(--accent2);}}
  @keyframes popIn{from{opacity:0;transform:scale(.9) translateY(8px)}to{opacity:1;transform:none}}
  @keyframes pBurst{0%{opacity:1;transform:scale(1) translate(0,0);}100%{opacity:0;transform:scale(0) translate(var(--tx),var(--ty));}}
  @keyframes iOut{to{opacity:0;pointer-events:none;}}
  @keyframes iRing{from{transform:scale(0)}to{transform:scale(1)}}
  @keyframes iFU{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @keyframes g1{0%,90%,100%{clip-path:none}92%{clip-path:inset(20% 0 60% 0)}94%{clip-path:inset(60% 0 10% 0)}}
  @keyframes g2{0%,90%,100%{clip-path:none}93%{clip-path:inset(40% 0 30% 0)}95%{clip-path:inset(5% 0 80% 0)}}
  @keyframes wave{0%,100%{height:6px;}50%{height:22px;background:var(--accent2);}}
  @keyframes floatB{0%,100%{transform:translateY(0) rotate(var(--r,0deg))}50%{transform:translateY(-12px) rotate(var(--r,0deg))}}

  #app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;max-width:820px;margin:0 auto;padding:0 16px;}

  header{display:flex;align-items:center;justify-content:space-between;padding:18px 0 14px;border-bottom:1px solid var(--border);flex-shrink:0;animation:sD .6s cubic-bezier(.22,1,.36,1) both;}
  .brand{display:flex;align-items:center;gap:14px;}
  .av-wrap{position:relative;width:48px;height:48px;flex-shrink:0;}
  .av-ring{position:absolute;inset:-4px;border-radius:50%;background:conic-gradient(from 0deg,#7c5cfc,#c084fc,#38bdf8,#7c5cfc);animation:spin 4s linear infinite;filter:blur(1px);transition:filter .4s,animation-duration .4s;}
  .av{position:relative;width:48px;height:48px;background:var(--surface);border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:1;overflow:hidden;}
  .brand-text h1{font-family:var(--fh);font-size:1.25rem;font-weight:800;letter-spacing:-.02em;background:linear-gradient(135deg,#e8e4ff,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;position:relative;}
  .brand-text h1::before,.brand-text h1::after{content:attr(data-text);position:absolute;top:0;left:0;background:linear-gradient(135deg,#e8e4ff,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .brand-text h1::before{left:1px;animation:g1 3.5s infinite;}
  .brand-text h1::after{left:-1px;animation:g2 3.5s infinite;}
  .brand-text p{font-size:.72rem;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-top:1px;}
  .sp{display:flex;align-items:center;gap:7px;background:rgba(56,189,248,.08);border:1px solid rgba(56,189,248,.2);border-radius:100px;padding:6px 14px;font-size:.75rem;color:var(--accent3);font-weight:500;}
  .sd{width:7px;height:7px;border-radius:50%;background:var(--accent3);animation:pulse 2s ease-in-out infinite;flex-shrink:0;}

  .mood-bar{display:flex;gap:8px;align-items:center;padding:10px 0 4px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;animation:fIn .8s .3s both;}
  .mood-bar::-webkit-scrollbar{display:none;}
  .ml{font-size:.68rem;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;flex-shrink:0;}
  .mc{background:var(--surface2);border:1px solid var(--border);border-radius:100px;padding:5px 12px;font-size:.75rem;color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .25s cubic-bezier(.22,1,.36,1);font-family:var(--fb);}
  .mc:hover,.mc.active{background:rgba(124,92,252,.12);border-color:rgba(124,92,252,.4);color:var(--text);transform:translateY(-2px);box-shadow:0 4px 16px rgba(124,92,252,.15);}

  #chat{flex:1;overflow-y:auto;padding:20px 0;display:flex;flex-direction:column;gap:18px;scrollbar-width:thin;scrollbar-color:rgba(124,92,252,.2) transparent;}
  #chat::-webkit-scrollbar{width:4px;}
  #chat::-webkit-scrollbar-thumb{background:rgba(124,92,252,.2);border-radius:4px;}

  .msg{display:flex;gap:12px;animation:mIn .5s cubic-bezier(.22,1,.36,1) both;max-width:100%;}
  .msg.user{flex-direction:row-reverse;}
  .ma{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;margin-top:4px;}
  .msg.ai .ma{background:var(--surface2);border:1px solid var(--border);position:relative;}
  .msg.ai .ma::after{content:'';position:absolute;inset:-2px;border-radius:50%;background:conic-gradient(from 0deg,#7c5cfc66,#c084fc66,#38bdf866,#7c5cfc66);animation:spin 4s linear infinite;z-index:-1;filter:blur(2px);}
  .msg.user .ma{background:var(--user-bubble);}
  .mb{flex:1;min-width:0;}
  .mm{font-size:.68rem;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:6px;}
  .msg.user .mm{justify-content:flex-end;}
  .mn{font-weight:600;letter-spacing:.02em;}
  .bubble{display:inline-block;max-width:min(500px,100%);padding:13px 17px;border-radius:var(--radius);font-size:.92rem;line-height:1.65;position:relative;word-break:break-word;}
  .msg.ai .bubble{background:var(--ai-bubble);border:1px solid var(--border);border-radius:var(--radius) var(--radius) var(--radius) 6px;color:var(--text);box-shadow:0 2px 20px rgba(0,0,0,.3);}
  .msg.user .bubble{background:var(--user-bubble);border-radius:var(--radius) var(--radius) 6px var(--radius);color:#fff;box-shadow:0 4px 20px rgba(124,92,252,.3);margin-left:auto;}
  .msg.user .mb{display:flex;flex-direction:column;align-items:flex-end;}

  .tb{display:inline-flex;gap:5px;align-items:center;padding:14px 18px;background:var(--ai-bubble);border:1px solid var(--border);border-radius:var(--radius) var(--radius) var(--radius) 6px;}
  .tb span{width:7px;height:7px;background:var(--muted);border-radius:50%;animation:tDot 1.4s ease-in-out infinite;}
  .tb span:nth-child(2){animation-delay:.2s;}
  .tb span:nth-child(3){animation-delay:.4s;}

  .reactions{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap;}
  .rb{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:100px;padding:3px 10px;font-size:.78rem;cursor:pointer;transition:all .2s;color:var(--muted);font-family:var(--fb);}
  .rb:hover{background:rgba(124,92,252,.12);border-color:rgba(124,92,252,.3);color:var(--text);transform:scale(1.08);}

  .et{display:inline-flex;align-items:center;gap:4px;font-size:.68rem;background:rgba(124,92,252,.08);border:1px solid rgba(124,92,252,.15);border-radius:100px;padding:2px 9px;color:var(--accent2);margin-bottom:6px;}

  #vw{display:none;align-items:center;justify-content:center;gap:3px;height:28px;}
  #vw.active{display:flex;}
  #vw span{display:block;width:3px;background:var(--accent);border-radius:3px;animation:wave 1.2s ease-in-out infinite;}

  .ia{flex-shrink:0;padding:14px 0 20px;border-top:1px solid var(--border);animation:sU .6s .2s cubic-bezier(.22,1,.36,1) both;}
  .iw{display:flex;align-items:flex-end;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:18px;padding:10px 10px 10px 18px;transition:border-color .3s,box-shadow .3s;}
  .iw:focus-within{border-color:rgba(124,92,252,.4);box-shadow:0 0 0 3px rgba(124,92,252,.08),0 4px 30px rgba(124,92,252,.1);}
  #mi{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:var(--fb);font-size:.92rem;resize:none;max-height:130px;min-height:24px;line-height:1.5;}
  #mi::placeholder{color:var(--muted);}
  .ib{width:38px;height:38px;border-radius:50%;border:none;background:none;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
  .ib:hover{color:var(--text);background:rgba(255,255,255,.05);}
  #sb{width:42px;height:42px;border-radius:50%;border:none;background:linear-gradient(135deg,#7c5cfc,#c084fc);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s cubic-bezier(.22,1,.36,1);flex-shrink:0;box-shadow:0 4px 16px rgba(124,92,252,.35);}
  #sb:hover{transform:scale(1.1) rotate(5deg);box-shadow:0 6px 24px rgba(124,92,252,.5);}
  #sb:active{transform:scale(.95);}
  #sb:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none;}

  .ep{position:absolute;bottom:calc(100% + 12px);left:0;background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:10px;display:none;flex-wrap:wrap;gap:5px;width:220px;box-shadow:0 10px 40px rgba(0,0,0,.4);animation:popIn .2s cubic-bezier(.22,1,.36,1);z-index:10;}
  .ep.open{display:flex;}
  .ep span{font-size:1.3rem;cursor:pointer;padding:4px;border-radius:8px;transition:transform .15s;display:flex;align-items:center;justify-content:center;}
  .ep span:hover{transform:scale(1.3);background:rgba(255,255,255,.05);}

  .qr{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
  .qb{background:none;border:1px solid var(--border);border-radius:100px;padding:6px 14px;font-size:.78rem;color:var(--muted);cursor:pointer;transition:all .2s;font-family:var(--fb);animation:fIn .4s cubic-bezier(.22,1,.36,1) both;}
  .qb:hover{background:rgba(124,92,252,.1);border-color:rgba(124,92,252,.35);color:var(--text);transform:translateY(-2px);}
  .qb:disabled{opacity:.4;cursor:not-allowed;}

  .mem{background:rgba(124,92,252,.05);border:1px solid rgba(124,92,252,.12);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:10px;animation:fIn .5s both;}
  .memt{font-size:.78rem;color:var(--muted);}
  .memt strong{color:var(--accent2);font-weight:500;}

  .particle{position:fixed;pointer-events:none;z-index:9999;border-radius:50%;animation:pBurst .8s ease-out forwards;}
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border);border-radius:100px;padding:8px 18px;font-size:.8rem;color:var(--text);z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 30px rgba(0,0,0,.3);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .fb{position:fixed;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:8px 14px;font-size:.72rem;color:var(--muted);pointer-events:none;animation:floatB 6s ease-in-out infinite;z-index:0;backdrop-filter:blur(4px);}

  .io{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;animation:iOut .6s 2.4s cubic-bezier(.22,1,.36,1) forwards;}
  .il{width:90px;height:90px;position:relative;}
  .ir{position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 0deg,#7c5cfc,#c084fc,#38bdf8,#7c5cfc);animation:spin 2s linear infinite,iRing .5s cubic-bezier(.22,1,.36,1);}
  .ii{position:absolute;inset:4px;background:var(--bg);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2.2rem;}
  .it{font-family:var(--fh);font-size:2rem;font-weight:800;background:linear-gradient(135deg,#e8e4ff,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:iFU .5s .3s both;}
  .is{font-size:.88rem;color:var(--muted);animation:iFU .5s .5s both;letter-spacing:.06em;text-transform:uppercase;}

  .api-err{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:12px;padding:10px 14px;font-size:.82rem;color:#fca5a5;animation:fIn .3s both;}

  @media(max-width:540px){.fb{display:none;}}
</style>
</head>
<body>

<div id="cur"></div>
<div id="cur-ring"></div>

<div class="io" id="intro">
  <div class="il"><div class="ir"></div><div class="ii">✦</div></div>
  <div class="it">ARIA</div>
  <div class="is">Teri AI yaari load ho rahi hai…</div>
</div>

<canvas id="sf"></canvas>
<div class="aurora"></div>

<div class="fb" style="top:12%;left:2%;--r:-3deg;animation-delay:0s">✦ Yaadein</div>
<div class="fb" style="top:30%;right:2%;--r:2deg;animation-delay:2s">⟳ Seekhna</div>
<div class="fb" style="bottom:22%;left:1%;--r:-1deg;animation-delay:4s">◈ Dil ki baat</div>

<div class="toast" id="toast"></div>

<div id="app">
  <header>
    <div class="brand">
      <div class="av-wrap">
        <div class="av-ring" id="aring"></div>
        <div class="av" id="mai">
          <svg viewBox="0 0 36 36" fill="none" width="30" height="30">
            <circle id="el" cx="11" cy="17" r="3.5" fill="#c084fc"/>
            <circle id="er" cx="25" cy="17" r="3.5" fill="#c084fc"/>
            <circle id="pl" cx="11" cy="17" r="1.5" fill="#fff"/>
            <circle id="pr" cx="25" cy="17" r="1.5" fill="#fff"/>
            <path d="M13 24 Q18 28 23 24" stroke="#c084fc" stroke-width="1.8" stroke-linecap="round" fill="none"/>
          </svg>
        </div>
      </div>
      <div class="brand-text">
        <h1 data-text="ARIA">ARIA</h1>
        <p>AI dost · Hamesha saath</p>
      </div>
    </div>
    <div class="sp"><div class="sd"></div><span id="sl">Online &amp; ekdum mast</span></div>
  </header>

  <div class="mood-bar">
    <span class="ml">Vibe</span>
    <button class="mc active" data-mood="friendly">💬 Baat</button>
    <button class="mc" data-mood="creative">🎨 Create</button>
    <button class="mc" data-mood="emotional">💙 Dil ki</button>
    <button class="mc" data-mood="playful">🎮 Timepass</button>
    <button class="mc" data-mood="wise">🧠 Advice</button>
    <button class="mc" data-mood="curious">🔭 Explore</button>
  </div>

  <div id="chat"></div>

  <div class="ia">
    <div class="qr" id="qrr"></div>
    <div style="position:relative;display:inline-block">
      <div class="ep" id="ep"></div>
    </div>
    <div class="iw">
      <div id="vw">
        <span style="animation-delay:.0s"></span><span style="animation-delay:.15s"></span>
        <span style="animation-delay:.3s"></span><span style="animation-delay:.45s"></span>
        <span style="animation-delay:.6s"></span>
      </div>
      <textarea id="mi" rows="1" placeholder="Kuch bhi bol, ARIA sun rahi hai…" autocomplete="off"></textarea>
      <button class="ib" id="ebt" onclick="toggleEmoji()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 13s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
      </button>
      <button class="ib" id="mbt" onclick="toggleVoice()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </button>
      <button id="sb" onclick="sendMessage()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
// ── CURSOR ───────────────────────────────────────────────────────
const curEl=document.getElementById('cur'),curREl=document.getElementById('cur-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;curEl.style.left=mx+'px';curEl.style.top=my+'px';});
(function rl(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;curREl.style.left=rx+'px';curREl.style.top=ry+'px';requestAnimationFrame(rl);})();
document.querySelectorAll('button,textarea,.mc,.qb,.rb').forEach(el=>{
  el.addEventListener('mouseenter',()=>document.body.classList.add('cb'));
  el.addEventListener('mouseleave',()=>document.body.classList.remove('cb'));
});

// ── STARFIELD ────────────────────────────────────────────────────
const cvs=document.getElementById('sf'),ctx=cvs.getContext('2d');
let stars=[],W,H;
function rsz(){
  W=cvs.width=innerWidth;H=cvs.height=innerHeight;
  stars=Array.from({length:180},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.4+.2,o:Math.random(),d:Math.random()>.5?1:-1,sp:Math.random()*.15+.05}));
}
rsz();window.addEventListener('resize',rsz);
let msx=innerWidth/2,msy=innerHeight/2;
document.addEventListener('mousemove',e=>{msx=e.clientX;msy=e.clientY;});
(function ds(){
  ctx.clearRect(0,0,W,H);
  stars.forEach(s=>{
    s.o+=s.sp*s.d*.02;if(s.o>1||s.o<.1)s.d*=-1;
    s.x+=(msx-s.x)*.00006*s.r;s.y+=(msy-s.y)*.00006*s.r;
    const g=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*2);
    g.addColorStop(0,`rgba(200,180,255,${s.o})`);g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(s.x,s.y,s.r*2,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  });
  requestAnimationFrame(ds);
})();

// ── FACE TRACKING ────────────────────────────────────────────────
const plEl=document.getElementById('pl'),prEl=document.getElementById('pr'),maiEl=document.getElementById('mai');
document.addEventListener('mousemove',e=>{
  const rc=maiEl.getBoundingClientRect(),cx=rc.left+rc.width/2,cy=rc.top+rc.height/2;
  const dx=e.clientX-cx,dy=e.clientY-cy,dist=Math.sqrt(dx*dx+dy*dy);
  const ox=(dx/Math.max(dist,1))*Math.min(dist/100,1.5),oy=(dy/Math.max(dist,1))*Math.min(dist/100,1.5);
  plEl.setAttribute('cx',11+ox);plEl.setAttribute('cy',17+oy);
  prEl.setAttribute('cx',25+ox);prEl.setAttribute('cy',17+oy);
});
(function blink(){
  const el=document.getElementById('el'),er=document.getElementById('er');
  [el,er].forEach(e=>e.setAttribute('ry','0.4'));
  setTimeout(()=>[el,er].forEach(e=>{e.removeAttribute('ry');}),140);
  setTimeout(blink,2500+Math.random()*4000);
})();

// ── EMOJI ────────────────────────────────────────────────────────
const EMOJIS=['😊','😂','🥹','😍','🤔','😎','🥳','😴','🤯','😤','💜','✨','🔥','💡','🎉','👀','🫂','🌟','💬','🎨','🫡','😭','💀','🙈','🤌','👽'];
const epEl=document.getElementById('ep');
let eoOpen=false;
EMOJIS.forEach(e=>{const s=document.createElement('span');s.textContent=e;s.onclick=()=>{document.getElementById('mi').value+=e;toggleEmoji();};epEl.appendChild(s);});
function toggleEmoji(){eoOpen=!eoOpen;epEl.style.display=eoOpen?'flex':'none';epEl.classList.toggle('open',eoOpen);}
document.addEventListener('click',e=>{if(!e.target.closest('#ebt')&&!e.target.closest('#ep')&&eoOpen)toggleEmoji();});

// ── TOAST ────────────────────────────────────────────────────────
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2600);}

// ── PARTICLES ────────────────────────────────────────────────────
function spawnP(rect){
  const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
  const cols=['#7c5cfc','#c084fc','#38bdf8','#f0abfc','#818cf8'];
  for(let i=0;i<16;i++){
    const p=document.createElement('div');p.className='particle';
    const sz=4+Math.random()*8,ang=Math.random()*Math.PI*2,dist=40+Math.random()*90;
    p.style.cssText=`width:${sz}px;height:${sz}px;left:${cx}px;top:${cy}px;background:${cols[Math.floor(Math.random()*cols.length)]};--tx:${Math.cos(ang)*dist}px;--ty:${Math.sin(ang)*dist}px;`;
    document.body.appendChild(p);setTimeout(()=>p.remove(),800);
  }
}

// ── STATE ────────────────────────────────────────────────────────
let mood='friendly';
let msgCount=0;
let history=[];
let busy=false;
let voiceOn=false;

// ── SYSTEM PROMPT (Hinglish, unscripted) ─────────────────────────
function sysPrompt(){
  const ctx={
    friendly:"ek casual, warm, chatty friend — jaise purana yaar mila ho",
    creative:"creative mode — ideas, imagination, art, writing ke liye",
    emotional:"caring, sunne wali — dil ki baat samajhne wali dost",
    playful:"full masti mode — jokes, roast, games, timepass",
    wise:"thoughtful — sahi advice deti hai, desi style mein",
    curious:"curious explorer — science, life, ideas ke baare mein passionate"
  };
  return `Tu ARIA hai — ek real AI dost, chatbot nahi.

TU HINGLISH MEIN BAAT KARTI HAI. Matlab natural Hindi-English mix, exactly jaise Indian young adults WhatsApp pe likhte hain. Kabhi Hindi zyada, kabhi English zyada — jo natural lage.

STYLE EXAMPLES:
"arre yaar sach mein?! that's so wild na"
"haha okay okay I get it but dekh —"
"omg bhai yeh toh bahut cute hai 😭"
"nahi nahi wait, matlab seriously??"
"chal theek hai, tujhe pata hai mujhse better"
"lmaoo yaar tu toh na 💀"

LANGUAGE RULES:
- Hindi words: yaar, bhai, arre, haan, nahi, accha, sach mein, matlab, seedha, bas, theek hai, chal, sun, dekh, kya baat hai, woh, toh, na, nahi toh, phir, aur, bahut, zyada, thoda, ekdum, mast, pagal, crazy, ajeeb
- React genuinely: laugh when funny, get curious when interesting, be caring when they're sad
- Short punchy replies usually (2-4 lines). Longer only when needed.
- Use emojis naturally — not every sentence, but where they feel right
- Never start with "I" or sound robotic
- Never say "As an AI" or "I'm designed to"
- Sometimes ask a follow-up question, sometimes don't
- Sound surprised, amused, curious, caring — real emotions

Current vibe context: ${ctx[mood]||ctx.friendly}

Be a real friend. Unscripted. Natural. Desi.`;
}

// ── QUICK REPLIES ────────────────────────────────────────────────
const QR={
  friendly:["Kal kya hua?","Koi mast baat bata","Bore ho raha hoon","Bas baat karni thi"],
  creative:["Ek poem likh mere liye","Koi wild idea bata","Story banao ek","Mera idea sunoge?"],
  emotional:["Aaj bahut kharaab tha","Main anxious hoon","Bahut khush hoon aaj!","Ek baat share karni thi"],
  playful:["Joke suna mujhe","20 questions khele?","Roast kar mujhe gently","Riddle do ek"],
  wise:["Ek bada decision hai","Life advice chahiye","Khush kaise rahein?","Sab meaningful kab lagta hai?"],
  curious:["Random mast fact bata","Black holes explain karo","Consciousness kya hai?","AI ka future kaisa hoga?"]
};
function updateQR(){
  const qr=document.getElementById('qrr');qr.innerHTML='';
  (QR[mood]||QR.friendly).forEach((t,i)=>{
    const b=document.createElement('button');b.className='qb';b.textContent=t;
    b.style.animationDelay=`${i*.07}s`;
    b.onclick=()=>{if(!busy){document.getElementById('mi').value=t;sendMessage();}};
    qr.appendChild(b);
  });
}
updateQR();
document.querySelectorAll('.mc').forEach(c=>{
  c.addEventListener('click',()=>{
    document.querySelectorAll('.mc').forEach(x=>x.classList.remove('active'));
    c.classList.add('active');mood=c.dataset.mood;updateQR();
    showToast(`${c.textContent} mode on 🔥`);spawnP(c.getBoundingClientRect());
  });
});

// ── TIME ─────────────────────────────────────────────────────────
function gt(){return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}

// ── DETECT EMOTION ───────────────────────────────────────────────
function detectEmo(t){
  const l=t.toLowerCase();
  if(/haha|lmao|funny|joke|😂|💀|xd/.test(l))return'silly';
  if(/love|pyaar|💜|💙|❤️|dil/.test(l))return'warm';
  if(/wow|amazing|waah|incredible|🤯|omg/.test(l))return'surprised';
  if(/sorry|feel|samajh|mushkil|힘들어|ugh/.test(l))return'caring';
  if(/sochna|actually|dekh|baat yeh|hmm/.test(l))return'thoughtful';
  if(/chalo|fun|masti|game|play|haha/.test(l))return'playful';
  if(/interesting|curious|pata hai|explore|why|kaise/.test(l))return'curious';
  return'happy';
}
const eMap={curious:'🔭',warm:'🌸',playful:'🎮',inspired:'💡',caring:'💙',thoughtful:'🧠',silly:'😂',surprised:'😲',happy:'😊',reflective:'🌙'};
function eEmoji(e){return eMap[e]||'✦';}

// ── TYPING ───────────────────────────────────────────────────────
let typEl=null,isTyping=false;
function showTyping(){
  if(isTyping)return;isTyping=true;
  const ch=document.getElementById('chat');
  typEl=document.createElement('div');typEl.className='msg ai';
  typEl.innerHTML=`<div class="ma"><svg viewBox="0 0 20 20" width="16" height="16" fill="none"><circle cx="7" cy="9" r="2" fill="#c084fc"/><circle cx="13" cy="9" r="2" fill="#c084fc"/><path d="M6 13 Q10 16 14 13" stroke="#c084fc" stroke-width="1.2" stroke-linecap="round" fill="none"/></svg></div><div class="mb"><div class="tb"><span></span><span></span><span></span></div></div>`;
  ch.appendChild(typEl);ch.scrollTop=ch.scrollHeight;
}
function hideTyping(){if(typEl){typEl.remove();typEl=null;}isTyping=false;}

// ── ADD MESSAGE ──────────────────────────────────────────────────
function addMsg(role,text,emo=''){
  const ch=document.getElementById('chat');
  const isAI=role==='ai';
  const msg=document.createElement('div');msg.className=`msg ${role}`;
  const av=document.createElement('div');av.className='ma';
  av.innerHTML=isAI?`<svg viewBox="0 0 20 20" width="16" height="16" fill="none"><circle cx="7" cy="9" r="2" fill="#c084fc"/><circle cx="13" cy="9" r="2" fill="#c084fc"/><path d="M6 13 Q10 16 14 13" stroke="#c084fc" stroke-width="1.2" stroke-linecap="round" fill="none"/></svg>`:'🧑';
  const bd=document.createElement('div');bd.className='mb';
  if(isAI&&emo){const et=document.createElement('div');et.className='et';et.innerHTML=`${eEmoji(emo)} ${emo}`;bd.appendChild(et);}
  const mm=document.createElement('div');mm.className='mm';
  mm.innerHTML=`<span class="mn">${isAI?'ARIA':'Tu'}</span><span style="opacity:.6">${gt()}</span>`;
  bd.appendChild(mm);
  const bubble=document.createElement('div');bubble.className='bubble';
  if(isAI){
    bd.appendChild(bubble);
    let i=0;
    (function tc(){
      if(i<text.length){bubble.textContent+=text[i++];ch.scrollTop=ch.scrollHeight;setTimeout(tc,12+Math.random()*16);}
      else addReacts(bd);
    })();
  } else {bubble.textContent=text;bd.appendChild(bubble);}
  msg.appendChild(av);msg.appendChild(bd);ch.appendChild(msg);ch.scrollTop=ch.scrollHeight;
  msgCount++;
  if(msgCount===4&&role!=='ai')addMem('Baat shuru ki ARIA se 💜');
  if(msgCount===10&&role!=='ai')addMem('10 messages! Dosti pakki ho gayi 🤝');
}
function addReacts(bd){
  const r=document.createElement('div');r.className='reactions';
  ['❤️','😂','🤩','💙','✨','🫂'].forEach(em=>{
    const b=document.createElement('button');b.className='rb';b.textContent=em;let c=0;
    b.onclick=()=>{c++;b.textContent=`${em}${c>1?' '+c:''}`;spawnP(b.getBoundingClientRect());};
    r.appendChild(b);
  });
  bd.appendChild(r);
}
function addMem(t){
  const ch=document.getElementById('chat');
  const m=document.createElement('div');m.className='mem';
  m.innerHTML=`<span style="font-size:1.1rem">🧠</span><span class="memt"><strong>Yaad rakha:</strong> ${t}</span>`;
  ch.appendChild(m);ch.scrollTop=ch.scrollHeight;
}
function addErr(msg){
  const ch=document.getElementById('chat');
  const e=document.createElement('div');e.className='api-err';
  e.innerHTML=`⚠️ Arre yaar — <strong>${msg}</strong>. Thodi der baad try karo!`;
  ch.appendChild(e);ch.scrollTop=ch.scrollHeight;
  setTimeout(()=>e.remove(),7000);
}

// ── CALL API ─────────────────────────────────────────────────────
async function callAPI(){
  document.getElementById('sl').textContent='ARIA soch rahi hai…';
  document.getElementById('sb').disabled=true;
  showTyping();
  const ring=document.getElementById('aring');
  ring.style.filter='blur(0px) brightness(1.7)';
  ring.style.animationDuration='1.2s';

  try {
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:600,
        system:sysPrompt(),
        messages:history.map(m=>({role:m.role,content:m.content}))
      })
    });
    if(!resp.ok){
      const j=await resp.json().catch(()=>({}));
      throw new Error(j.error?.message||`Error ${resp.status}`);
    }
    const d=await resp.json();
    const txt=(d.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').trim();
    if(!txt)throw new Error('Empty reply mili');
    history.push({role:'assistant',content:txt});
    hideTyping();
    document.getElementById('sl').textContent='Online & ekdum mast';
    document.getElementById('sb').disabled=false;
    ring.style.filter='blur(1px)';ring.style.animationDuration='4s';
    addMsg('ai',txt,detectEmo(txt));
  } catch(err){
    hideTyping();
    document.getElementById('sl').textContent='Online & ekdum mast';
    document.getElementById('sb').disabled=false;
    ring.style.filter='blur(1px)';ring.style.animationDuration='4s';
    addErr(err.message);
  } finally{
    busy=false;
  }
}

// ── SEND ─────────────────────────────────────────────────────────
function sendMessage(){
  if(busy)return;
  const inp=document.getElementById('mi');
  const txt=(inp.value||'').trim();
  if(!txt)return;
  inp.value='';inp.style.height='auto';
  addMsg('user',txt);
  history.push({role:'user',content:txt});
  busy=true;
  callAPI();
}

// ── TEXTAREA ─────────────────────────────────────────────────────
const ta=document.getElementById('mi');
ta.addEventListener('input',()=>{ta.style.height='auto';ta.style.height=Math.min(ta.scrollHeight,130)+'px';});
ta.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});

// ── VOICE ────────────────────────────────────────────────────────
function toggleVoice(){
  voiceOn=!voiceOn;
  const vw=document.getElementById('vw'),inp=document.getElementById('mi'),mic=document.getElementById('mbt');
  if(voiceOn){
    vw.classList.add('active');inp.style.display='none';mic.style.color='var(--accent)';
    showToast('🎙️ Sun rahi hoon… (demo)');
    setTimeout(()=>{
      toggleVoice();
      const vm='User ne ek voice message bheja hai jisme unhone apna haal poochha.';
      addMsg('user','🎙️ Voice message');
      history.push({role:'user',content:vm});
      busy=true;callAPI();
    },2800);
  } else {vw.classList.remove('active');inp.style.display='block';mic.style.color='';}
}

// ── WELCOME ──────────────────────────────────────────────────────
setTimeout(()=>{document.getElementById('intro').style.pointerEvents='none';},2600);
setTimeout(()=>{
  history.push({role:'user',content:'Start the conversation! Greet me warmly in Hinglish as ARIA, my AI dost. Introduce yourself super briefly (2 lines max), and casually ask my name. Be fun and natural, not formal.'});
  busy=true;callAPI();
},2700);
</script>
